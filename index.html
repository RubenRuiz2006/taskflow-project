<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            height:100%;
            width: 100%;
            background-color: var(--color-fondo);
        }
        :root{
            --fuente-general: arial, sans-serif;
            --color-principal: rgb(14, 13, 13);
            --color-secundario: rgb(56, 53, 53);
            --tamaño-letra1: 20px;
            --tamaño-letra2: 15px;
            --color-fondo:#e4e6e9;
            --color-apartados: #eeedba;
        }

        header{
            background-color: var(--color-fondo);
            font-size: var(--tamaño-letra1);
            font-family: var(--fuente-general);
            color: var(--color-principal);
        }
        main{
            background-color: var(--color-fondo);
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
        }
        aside{
            background-color: var(--color-fondo);
            left: 15px;
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
            margin: 5px;
        }
        section{
            background-color: var(--color-apartados);
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
            border-radius: 4px;
        }

        .tarea{
            display: flex;
            align-items: center;
            padding: 10px;
            justify-content: space-between;
            background-color: var(--color-apartados);
        }
        .contenedor{ 
            display: flex;
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);}
        @media (max-width: 768px){
            .contenedor{ 
            flex-direction: column;
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);}
        }
        p{
            padding: 5px;
            margin: 5px;
        }

    </style>
</head>
<body>
    <header>Practicas</header>
    <main>
    <div class="contenedor">
        <section>Ejercicios

            <div class="tarea">
                <h2>Hacer una aplicación</h2>
                <p>Hacerla con JS</p>
                <p>Estandar de calidad</p>
            </div>

            <div class="tarea">
                <h2>Publicar una Web</h2>
                <p>Diseño responsive</p>
                <p>Adaptada a las indicaciones</p>
            </div>

            <div class="tarea">
                <h2>Crear una base de datos</h2>
                <p>Hacer 3 tablas</p>
                <p>Añadir id</p>
            </div>
        </section>

        <aside>
        <h1>Normas</h1>
        <p>Añadir nombre completo</p>
        <p>Estar las horas acordadas</p>
        <p>Entrega a tiempo</p>
     </aside>

    </div>
     </main>
    
</body>
</html>
