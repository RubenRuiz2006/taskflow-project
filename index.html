<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>Prácticas</header>
    <main>
        <div class="contenedor" id="contenedor">
            <section id="section">

                
            </section>
            <button id="botónAñadir" class="botonAñadir">Añadir tarea</button>

            <aside>
                <h2 class="normas">Normas:</h2>
                <ul>
                    <li>Añadir nombre completo</li>
                    <li>Estar las horas acordadas</li>
                    <li>Entregar a tiempo</li>
                </ul>
            </aside>

        </div>
        <div class="ventanaAñadir" id="ventanaAñadir">

            <label for="nombre">
                <h2>Nombre de la tarea</h2>
            </label>
            <input type="text" id="nombre" placeholder="Nombre de la tarea">

            <label for="categoría">
                <h2>Categoría de la tarea</h2>
            </label>
            <input type="text" id="categoría" placeholder="Categoría de la tarea">

            <label for="prioridad">
                <h2>Prioridad de la tarea</h2>
            </label>
            <select id="prioridad">
                <option value="Baja">Baja </option>
                <option value="Media">Media </option>
                <option value="Alta">Alta </option>

            </select>
            <button class="botonConfirmar" id="botonConfirmar">Añadir</button>

        </div>
        <script src="code.js"></script>
    </main>

</body>

</html>
