<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100%;
            width: 100%;
            background-color: var(--color-fondo);

        }

        .ventanaAñadir {

            top: 50%;
            left: 50%;
            display: none;
            margin: auto;
            padding: 10px;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            border: 1px solid black;
            background-color: var(--color-apartados);
            position: fixed;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;


        }

        input {
            width: 300px;
            height: 30px;

        }
        select{
            width: 300px;
            height: 30px;
        }

        .buttonQuitar {
            height: 30px;
            width: 50px;
            margin: 10px;
        }

        .botonConfirmar {
            height: 30px;
            width: 50px;
           margin-top: 20px;
            
            


        }

        button {
            cursor: pointer;
            padding: 0px;

            border: 0.5px solid black;
        }

        button:hover {
            background-color: var(--fondo-header);
            color: var(--color-header);
            transition: 0.5s;
        }

        :root {
            --fuente-general: arial, sans-serif;
            --color-principal: #1f2933;
            --color-secundario: #2a2c30;
            --tamaño-letra1: 40px;
            --tamaño-letra2: 15px;
            --color-fondo: #e0e1e2;
            --color-apartados: #fdfdfd;
            --fondo-header: #2563eb;
            --color-header: rgb(248, 244, 244);
        }

        header {
            background-color: var(--fondo-header);
            font-size: var(--tamaño-letra1);
            font-family: var(--fuente-general);
            color: var(--color-header);
        }

        main {
            background-color: var(--color-fondo);
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
        }

        aside {
            background-color: var(--color-fondo);
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
            margin: 5px;
        }

        section {
            background-color: var(--color-apartados);
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
            border-radius: 4px;
        }

        .tarea {
            display: flex;
            align-items: center;
            padding: 10px;
            justify-content: space-between;
            background-color: var(--color-apartados);
            border: 1px solid black;




        }

        .tarea:hover {
            transition: 0.5s;
            background-color: #bfdbfe;
        }

        .contenedor {
            display: flex;
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
        }

        @media (max-width: 768px) {
            .contenedor {
                flex-direction: column;
                font-size: var(--tamaño-letra2);
                font-family: var(--fuente-general);
                color: var(--color-secundario);
            }
        }

        li {
            font-size: var(--tamaño-letra2);
            margin-bottom: 5px;
            margin-left: 10px;

        }

        .normas {
            margin-left: 5px;
            margin-top: 5px;
        }
        .Alta{
            color: rgb(218, 20, 20);
        }
        .Media{
            color: rgb(250, 162, 0);
        }
        .Baja{
            color: rgb(11, 180, 11);
        }

    </style>
</head>

<body>
    <header>Prácticas</header>
    <main>
        <div class="contenedor" id="contenedor">
            <section id="section">

                <div class="tarea">
                    <h2>Hacer una aplicación:</h2>
                    <ul>
                        <li><strong>Categoría:</strong> JavaScript</li>
                        <li class="Media"><strong>Prioridad:</strong> Media</li>
                    </ul>
                    <button class="buttonQuitar">Quitar</button>
                </div>

                <div class="tarea">
                    <h2>Publicar una Web:</h2>
                    <ul>
                        <li><strong>Categoría:</strong> HTML</li>
                        <li class="Baja"><strong>Prioridad:</strong> Baja</li>
                    </ul>
                    <button class="buttonQuitar">Quitar</button>
                </div>

                <div class="tarea">
                    <h2>Crear una base de datos:</h2>
                    <ul>

                        <li><strong>Categoría:</strong> MySQL</li>
                        <li class="Alta"><strong>Prioridad:</strong> Alta</li>
                    </ul>
                    <button class="buttonQuitar">Quitar</button>
                </div>

            </section>
            <button id="botónAñadir" class="botonAñadir">Añadir tarea</button>

            <aside>
                <h2 class="normas">Normas:</h2>
                <ul>
                    <li>Añadir nombre completo</li>
                    <li>Estar las horas acordadas</li>
                    <li>Entregar a tiempo</li>
                </ul>
            </aside>

        </div>
        <div class="ventanaAñadir" id="ventanaAñadir">

            <label for="nombre">
                <h2>Nombre de la tarea</h2>
            </label>
            <input type="text" id="nombre" placeholder="Nombre de la tarea">

            <label for="categoría">
                <h2>Categoría de la tarea</h2>
            </label>
            <input type="text" id="categoría" placeholder="Categoría de la tarea">

            <label for="prioridad">
                <h2>Prioridad de la tarea</h2>
            </label>
            <select id="prioridad">
                <option value="Baja">Baja </option>
                <option value="Media">Media </option>
                <option value="Alta">Alta </option>

            </select>
            <button class="botonConfirmar" id="botonConfirmar">Añadir</button>

        </div>
        <script src="code.js"></script>
    </main>

</body>

</html>
