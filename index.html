<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            height:100%;
            width: 100%;
            background-color: var(--color-fondo);
            
        }
        :root{
            --fuente-general: arial, sans-serif;
            --color-principal:#1f2933;
            --color-secundario: #2a2c30;
            --tamaño-letra1: 40px;
            --tamaño-letra2: 15px;
            --color-fondo:#e0e1e2;
            --color-apartados:#fdfdfd;
            --fondo-header: #2563eb;
            --color--header:rgb(248, 244, 244);
        }

        header{
            background-color: var(--fondo-header);
            font-size: var(--tamaño-letra1);
            font-family: var(--fuente-general);
            color: var(--color--header);
        }
        main{
            background-color: var(--color-fondo);
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
        }
        aside{
            background-color: var(--color-fondo);
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
            margin: 5px;
        }
        section{
            background-color: var(--color-apartados);
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);
            border-radius: 4px;
        }

        .tarea{
            display: flex;
            align-items: center;
            padding: 10px;
            justify-content: space-between;
            background-color: var(--color-apartados);
            border: 1px solid black;
            
            
            
        }
        .contenedor{ 
            display: flex;
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);}
            
        @media (max-width: 768px){
            .contenedor{ 
            flex-direction: column;
            font-size: var(--tamaño-letra2);
            font-family: var(--fuente-general);
            color: var(--color-secundario);}
        }
        li{
            font-size: var(--tamaño-letra2);
            margin-bottom: 5px;
            margin-left: 10px;
            
        }
        
        .normas{
            margin-left: 5px;
            margin-top: 5px;
        }

    </style>
</head>
<body>
    <header>Prácticas</header>
    <main>
    <div class="contenedor">
        <section>

            <div class="tarea">
                <h2>Hacer una aplicación:</h2>
                <ul>
                    <li><strong>Categoría:</strong> JavaScript</li>
                    <li><strong>Prioridad:</strong> Media</li>
                </ul>
            </div>

            <div class="tarea">
                <h2>Publicar una Web:</h2>
                <ul>
                <li><strong>Categoría:</strong> HTML</li>
                <li><strong>Prioridad:</strong> Baja</li>
                </ul>
            </div>

            <div class="tarea">
                <h2>Crear una base de datos:</h2>
                <ul>
                    
                <li><strong>Categoría:</strong> MySQL</li>
                <li><strong>Prioridad:</strong> Alta</li>
                </ul>
            </div>
        </section>

        <aside>
        <h2 class="normas">Normas:</h2>
        <ul>
        <li>Añadir nombre completo</li>
        <li>Estar las horas acordadas</li>
        <li>Entregar a tiempo</li>
        </ul>
     </aside>

    </div>
     </main>
    
</body>
</html>
