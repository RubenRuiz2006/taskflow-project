<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dragon Ball Characters</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Montserrat', sans-serif; }
body {
    background: linear-gradient(135deg,#f0f0f0,#ffe0b2);
    display:flex;
    justify-content:center;
    padding:50px 0;
    min-height:100vh;
}
.container {
    width: 900px;
    background:#fff;
    border-radius:15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    padding:30px;
    display:flex;
    flex-direction:column;
    align-items:center;
}
h1 {
    color:#bf360c;
    margin-bottom:25px;
    font-weight:600;
    text-align:center;
}
.search-bar {
    width:100%;
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
.search-bar input {
    flex:1;
    padding:12px 15px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}
.search-bar button {
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#bf360c;
    color:white;
    cursor:pointer;
    font-weight:600;
    font-size:16px;
}
.cards {
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
    width:100%;
}
.card {
    background:#fff3e0;
    border-radius:12px;
    padding:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
    transform: translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.card img {
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:10px;
}
.card h3 {
    margin-bottom:8px;
    color:#bf360c;
    font-weight:600;
}
.modal {
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content:center;
    align-items:center;
}
.modal-content {
    background:#fff;
    border-radius:12px;
    padding:30px;
    max-width:500px;
    width:100%;
    text-align:center;
    position: relative;
}
.close {
    position:absolute;
    top:15px;
    right:15px;
    font-size:22px;
    font-weight:600;
    cursor:pointer;
    color:#333;
}
.modal-content img {
    width:150px;
    height:150px;
    object-fit:contain;
    margin-bottom:15px;
}
.modal-content p {
    margin-bottom:8px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Dragon Ball Characters</h1>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar personaje...">
        <button id="btnSearch">Buscar</button>
    </div>
    <div class="cards" id="cardsContainer"></div>
</div>

<div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
        <span class="close" id="modalClose">&times;</span>
    </div>
</div>

<script>
const searchInput = document.getElementById("searchInput");
const btnSearch = document.getElementById("btnSearch");
const cardsContainer = document.getElementById("cardsContainer");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

// Obtener y mostrar personajes
async function fetchCharacters(query="") {
    cardsContainer.innerHTML = "<p>Cargando...</p>";
    try {
        let url = 'https://web.dragonball-api.com/characters';
        if(query) url += `?name=${encodeURIComponent(query)}`;
        const res = await fetch(url);
        const data = await res.json();
        displayCards(data);
    } catch(e) {
        cardsContainer.innerHTML = "<p>Error al cargar</p>";
    }
}

function displayCards(chars) {
    if (!chars || chars.length === 0) {
        cardsContainer.innerHTML = "<p>No se encontraron personajes</p>";
        return;
    }
    cardsContainer.innerHTML = "";
    chars.forEach(c => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${c.image}" alt="${c.name}">
            <h3>${c.name}</h3>
        `;
        card.onclick = () => showModal(c);
        cardsContainer.appendChild(card);
    });
}

// Modal de detalles
function showModal(c) {
    modalContent.innerHTML = `
        <span class="close" id="modalClose">&times;</span>
        <img src="${c.image}" alt="${c.name}">
        <h2>${c.name}</h2>
        <p><strong>Serie:</strong> ${c.series || "Desconocida"}</p>
        <p><strong>Raza:</strong> ${c.race || "Desconocida"}</p>
        <p><strong>Debut:</strong> ${c.debut || "Desconocido"}</p>
    `;
    document.getElementById("modalClose").onclick = () => modal.style.display="none";
    modal.style.display="flex";
}

// Buscador
btnSearch.onclick = () => fetchCharacters(searchInput.value);
searchInput.addEventListener("keypress", e => {
    if (e.key === "Enter") btnSearch.click();
});

// Cerrar modal al clicar fuera
window.onclick = e => {
    if (e.target === modal) modal.style.display="none";
};

// Cargar al inicio
fetchCharacters();
</script>

</body>
</html>
