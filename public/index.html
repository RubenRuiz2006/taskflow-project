<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-white">
    
    <header class="text-4xl p-4 bg-indigo-600 text-white flex items-center justify-between"> <span>Prácticas</span>
        <button id="botonTema"
        class="ml-4 px-3 cursor-pointer py-1  
                hover:text-white transition-colors duration-500 
                flex items-center justify-center gap-2 bg-transparent">
        <svg id="iconoTema" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="48" height="48">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
        </svg>
                </button>
    </header>
    <main>
        <div class="contenedor" id="contenedor" style="display: flex;">
            <section id="section" >

                
            </section>
            <button id="botonAñadir" class="botonAñadir text-blue-500 cursor-pointer bg-gray-200 p-3 border border-black hover:bg-indigo-600 hover:text-white transition duration-300">Añadir tarea</button>

            <aside>
                <h2 class="text-2xl p-3 underline"><strong>Normas:</strong></h2>
                <ul class="list-disc ml-10">
                    <li class="mb-1">Añadir nombre completo</li>
                    <li class="mb-1">Estar las horas acordadas</li>
                    <li class="mb-1">Entregar a tiempo</li>
                </ul>
            </aside>

        </div>
        
        <div class="ventanaAñadir bg-yellow-100 shadow-xl fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 p-2.5 flex flex-col items-start justify-start border border-black w-[350px] h-[350px]  " style="display: none;" id="ventanaAñadir">

            <label for="nombre">
                <h2 class="text-2xl p-3"><strong>Nombre de la tarea</strong></h2>
            </label>
            <input type="text" id="nombre" placeholder="Nombre de la tarea" class=" border h-10 w-70 bg-white ml-3">

            <label for="categoria">
                <h2 class="text-2xl p-3"><strong>Categoría de la tarea</strong></h2>
            </label>
            <input type="text" id="categoria" placeholder="Categoría de la tarea" class=" border h-10 w-70 bg-white ml-3">

            <label for="prioridad">
                <h2 class="text-2xl p-3"><strong>Prioridad de la tarea</strong></h2>
            </label>
            <select id="prioridad" class="ml-3 border h-10 w-70 bg-white ml-3">
                <option value="Baja">Baja </option>
                <option value="Media">Media </option>
                <option value="Alta">Alta </option>

            </select>
            <button class="buttonAgregar m-3 text-blue-500 cursor-pointer bg-gray-200 p-3 rounded border border-black hover:bg-indigo-600 hover:text-white transition duration-300" id="botonConfirmar">Añadir</button>

        </div>
        <script src="code.js"></script>
    </main>

</body>

</html>
