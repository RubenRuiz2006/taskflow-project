<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23007b8a' d='M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 18H5V5h2v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V5h2v16z'/%3E%3Cpath fill='%23007b8a' d='M7 10h10v2H7zm0 4h10v2H7zm0 4h7v2H7z'/%3E%3C/svg%3E">
</head>

<body class="bg-stone-100 font-[Poppins]">
    
    <header class="text-4xl p-4 bg-cyan-700 text-white flex items-center justify-between"> <span>Prácticas</span>
        <button id="botonTema"
        class=" icono ml-4 px-3 cursor-pointer py-1  
                 transition-colors duration-500 
                flex items-center justify-center gap-2 bg-transparent">
        <svg id="iconoTema" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="48" height="48">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
        </svg>
                </button>
    </header>
    <div id="overlay" class="hidden fixed inset-0 bg-black/40 z-10"></div>
    <main class="relative">
        <div class="contenedor flex flex-col items-center gap-4 p-4 md:flex-row md:items-start md:justify-center xl:max-w-6xl xl:mx-auto xl:w-full" id="contenedor">
            
            <div class="hidden md:block md:min-w-[160px]"></div>
            <div class="flex flex-col gap-2 w-full max-w-[600px] xl:max-w-3xl">
            <div class="flex gap-2">
                
             <button id="botonAñadir" class="botonAñadir w-2/3 text-cyan-700 cursor-pointer bg-gray-200 p-3 border border-black rounded hover:bg-cyan-700 hover:text-white transition duration-300">Añadir tarea</button>
             
             <button id="botonOrdenarPrioridad" class=" botonOrdenarPrioridad w-1/3 text-cyan-700 cursor-pointer bg-gray-200 p-2.5 border rounded border-black hover:bg-cyan-700 hover:text-white transition duration-300" style="font-size: 0.95rem; line-height: 1.1;">Ordenar por prioridad</button>
                <div class="relative">
    <button id="botonFiltrar" class="botonFiltrar h-full min-w-[130px] p-3 text-center whitespace-nowrap flex-shrink-0 text-cyan-700 cursor-pointer bg-gray-200 border border-black rounded hover:bg-cyan-700 hover:text-white transition duration-300 text-sm">Filtrar ▾</button>
    <div id="dropdownFiltro" class="filtro hidden absolute top-full left-0 mt-1 bg-white border border-black rounded z-30 min-w-[120px]">
        <div class="filtroTodos textoTodos dropdown-item px-4 py-2 cursor-pointer hover:bg-cyan-100 text-sm text-black" data-filtro="Todas">Todas</div>
        <div class="filtroTodos dropdown-item px-4 py-2 cursor-pointer hover:bg-cyan-100 text-sm text-red-600" data-filtro="Alta">Alta</div>
        <div class="filtroTodos dropdown-item px-4 py-2 cursor-pointer hover:bg-cyan-100 text-sm text-orange-400" data-filtro="Media">Media</div>
        <div class="filtroTodos dropdown-item px-4 py-2 cursor-pointer hover:bg-cyan-100 text-sm text-green-600" data-filtro="Baja">Baja</div>
    </div>
</div>

             </div>

             <div class="flex gap-2">
    <button id="botonCompletarTodo" class="botonCompletarTodo w-1/2 cursor-pointer bg-green-200 text-green-600 p-2.5 border rounded border-black hover:bg-green-300 hover:text-black transition duration-300" style="font-size: 0.95rem;">Completar todo</button>
    <button id="botonEliminarCompletadas" class="botonEliminarCompletadas w-1/2 text-red-600 cursor-pointer bg-red-300 p-2.5 border rounded border-black hover:bg-red-400 hover:text-black transition duration-300" style="font-size: 0.95rem;">Eliminar completadas</button>
</div>

             <div id="estadoCarga" class="hidden flex justify-center p-6">
    <div class="w-8 h-8 border-4 border-cyan-700 border-t-transparent rounded-full animate-spin"></div>
</div>
<div id="estadoError" class="hidden text-red-500 border border-red-300 rounded p-4 text-center">Error al conectar con el servidor</div>
             <section id="section" class="flex flex-col gap-2" ></section>
            <div id="sinTareas" class="hidden text-gray-400 border border-dashed border-gray-300 rounded p-6 text-center w-full max-w-[800px] ">
        No hay tareas pendientes
    </div>    
            </div>       

          
           
            
               
                
            

            <aside class="self-start mt-2 md:mt-0 md:min-w-[160px]">
                <h2 class="text-2xl p-3 underline"><strong>Normas:</strong></h2>
                <ul class="list-disc ml-10">
                    <li class="mb-1">Añadir nombre completo</li>
                    <li class="mb-1">Estar las horas acordadas</li>
                    <li class="mb-1">Entregar a tiempo</li>
                </ul>
            </aside>

        </div>
        
        <div class="ventanaAñadir bg-white shadow-xl rounded-lg fixed border border-black w-[90vw] max-w-[420px] h-auto p-4 flex flex-col gap-1 z-20 lg:h-[500px]"
     style="display:none; top:50%; left:50%; transform: translate(-50%, -50%);"
     id="ventanaAñadir">
            <label for="nombre">
                <h2 class=" subtitulo text-2xl p-3 text-cyan-700"><strong>Nombre de la tarea</strong></h2>
            </label>
            <input type="text" id="nombre" placeholder="Nombre de la tarea" class=" border h-10 w-70 bg-white ml-3" maxlength="20">
            <div id="errorN" class="hidden text-red-600 text-sm ml-3">El nombre es obligatorio</div>
            <label for="categoria">
                <h2 class=" subtitulo text-2xl p-3 text-cyan-700"><strong>Categoría de la tarea</strong></h2>
            </label>
            
            <input type="text" id="categoria" placeholder="Categoría de la tarea" class=" border h-10 w-70 bg-white ml-3" maxlength="20">
                <div id="errorC" class="hidden text-red-600 text-sm ml-3">Rellena la categoría</div>

            <label for="prioridad">
                <h2 class=" subtitulo text-2xl p-3 text-cyan-700"><strong>Prioridad de la tarea</strong></h2>
            </label>
            <select id="prioridad" class=" ml-3 border h-10 w-70 bg-white ml-3">
                <option value="Baja">Baja </option>
                <option value="Media">Media </option>
                <option value="Alta">Alta </option>

            </select>
            <label for="fecha">
    <h2 class="subtitulo text-2xl p-3 text-cyan-700"><strong>Fecha de entrega</strong></h2>
</label>
<input type="date" id="fecha" class="border h-10 w-70 bg-white ml-3">
<p class="text-xs text-gray-400 ml-3 mb-1">Opcional</p>
            <div class="flex justify-between items-center w-full mt-3 lg:mt-0">
                <button id="btnVolver" class="btnVolver text-cyan-700 m-3 cursor-pointer bg-gray-200 p-3 rounded border border-black hover:bg-cyan-700 hover:text-white transition duration-300" >Atrás</button>
                <button class="buttonAgregar mr-2 text-cyan-700 cursor-pointer bg-gray-200 p-3 rounded border border-black hover:bg-cyan-700 hover:text-white transition duration-300" id="botonConfirmar">Añadir</button>
                 
                </div>
        </div>
        <script type="module" src="code.js"></script> <!-- "module" se pone para indicar que code.js puede importar y exportar funciones de archivos diferentes-->
    </main>

</body>

</html>
