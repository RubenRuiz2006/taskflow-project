<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

</head>

<body class="bg-stone-100 font-[Poppins]">
    
    <header class="text-4xl p-4 bg-cyan-700 text-white flex items-center justify-between"> <span>Prácticas</span>
        <button id="botonTema"
        class=" icono ml-4 px-3 cursor-pointer py-1  
                 transition-colors duration-500 
                flex items-center justify-center gap-2 bg-transparent">
        <svg id="iconoTema" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="48" height="48">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
        </svg>
                </button>
    </header>
    <div id="overlay" class="hidden fixed inset-0 bg-black/40 z-10"></div>
    <main>
        <div class="contenedor flex flex-col items-start gap-4 p-4 md:flex-row" id="contenedor">
            <div class="flex flex-col gap-2 min-w-100 max-w-[800px]">
            <div class="flex gap-2">
                
             <button id="botonAñadir" class="botonAñadir w-1/2 text-cyan-700 cursor-pointer bg-gray-200 p-3 border border-black rounded hover:bg-cyan-700 hover:text-white transition duration-300">Añadir tarea</button>
                <button id="botonOrdenarPrioridad" class=" botonOrdenarPrioridad w-1/2 text-cyan-700 cursor-pointer bg-gray-200 p-2.5 border rounded border-black hover:bg-cyan-700 hover:text-white transition duration-300" style="font-size: 0.95rem; line-height: 1.1;">Ordenar por prioridad</button>
             </div>
             <section id="section" class="flex flex-col gap-2" ></section>
            <div id="sinTareas" class="hidden text-gray-400 border border-dashed border-gray-300 rounded p-6 text-center w-full max-w-[800px] ">
        No hay tareas pendientes
    </div>    
            </div>       

          
           
            
               
                
            

            <aside>
                <h2 class="text-2xl p-3 underline"><strong>Normas:</strong></h2>
                <ul class="list-disc ml-10">
                    <li class="mb-1">Añadir nombre completo</li>
                    <li class="mb-1">Estar las horas acordadas</li>
                    <li class="mb-1">Entregar a tiempo</li>
                </ul>
            </aside>

        </div>
        
        <div class="ventanaAñadir bg-white shadow-xl rounded-lg fixed border border-black w-[350px] h-[400px] p-2.5 flex flex-col items-start justify-start z-20"
     style="display:none; top:50%; left:50%; transform: translate(-50%, -50%);"
     id="ventanaAñadir">
            <label for="nombre">
                <h2 class=" subtitulo text-2xl p-3 text-cyan-700"><strong>Nombre de la tarea</strong></h2>
            </label>
            <input type="text" id="nombre" placeholder="Nombre de la tarea" class=" border h-10 w-70 bg-white ml-3" maxlength="20">
            <div id="errorN" class="hidden text-red-600 text-sm ml-3">El nombre es obligatorio</div>
            <label for="categoria">
                <h2 class=" subtitulo text-2xl p-3 text-cyan-700"><strong>Categoría de la tarea</strong></h2>
            </label>
            
            <input type="text" id="categoria" placeholder="Categoría de la tarea" class=" border h-10 w-70 bg-white ml-3" maxlength="20">
                <div id="errorC" class="hidden text-red-600 text-sm ml-3">Rellena la categoría</div>

            <label for="prioridad">
                <h2 class=" subtitulo text-2xl p-3 text-cyan-700"><strong>Prioridad de la tarea</strong></h2>
            </label>
            <select id="prioridad" class=" ml-3 border h-10 w-70 bg-white ml-3">
                <option value="Baja">Baja </option>
                <option value="Media">Media </option>
                <option value="Alta">Alta </option>

            </select>
            <div class="flex justify-between items-center w-full mt-3">
                <button id="btnVolver" class="btnVolver mr-9  text-cyan-700 m-3 text-blue-500 cursor-pointer bg-gray-200 p-3 rounded border border-black hover:bg-cyan-700 hover:text-white transition duration-300" >Atrás</button>
                <button class="buttonAgregar mr-2 text-cyan-700  text-blue-500 cursor-pointer bg-gray-200 p-3 rounded border border-black hover:bg-cyan-700 hover:text-white transition duration-300" id="botonConfirmar">Añadir</button>
                 
                </div>
        </div>
        <script src="code.js"></script>
    </main>

</body>

</html>
